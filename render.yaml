services:
  - type: web
    name: fieldops-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      # Filled by Render dashboard or linked database; values are NOT committed.
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: LABOR_RATE_PER_HOUR
        sync: false
      - key: LOW_STOCK_THRESHOLD
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: OLLAMA_MODEL
        sync: false

databases:
  - name: fieldops-db
    databaseName: fieldops
    plan: free

